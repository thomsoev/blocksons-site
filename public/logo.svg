<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 330" role="img" aria-label="Blocksons LLC logo">
  <defs>
    <!-- Text gradient: yellow → orange → red (matching the truck decal) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD600"/>
      <stop offset="55%"  stop-color="#F07A00"/>
      <stop offset="100%" stop-color="#C23000"/>
    </linearGradient>
    <!-- Log fill -->
    <radialGradient id="logFill" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#F0E6D8"/>
      <stop offset="100%" stop-color="#D4C4A8"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="160" cy="148" r="106"/>
    </clipPath>
  </defs>

  <!-- ── AXES (behind circle) ── -->
  <!-- Left axe handle -->
  <rect x="18" y="141" width="155" height="14" rx="7" fill="#3A2A14" transform="rotate(-28 95 148)"/>
  <!-- Left axe head (blade faces outward left) -->
  <path d="M22 98 Q4 120 4 148 Q4 172 22 192 L52 170 L52 126 Z" fill="#2A2A2A" stroke="#111" stroke-width="2"/>
  <!-- Right axe handle -->
  <rect x="147" y="141" width="155" height="14" rx="7" fill="#3A2A14" transform="rotate(28 225 148)"/>
  <!-- Right axe head (blade faces outward right) -->
  <path d="M298 98 Q316 120 316 148 Q316 172 298 192 L268 170 L268 126 Z" fill="#2A2A2A" stroke="#111" stroke-width="2"/>

  <!-- ── LOG CROSS-SECTION (main circle) ── -->
  <circle cx="160" cy="148" r="106" fill="url(#logFill)" stroke="#2A2A2A" stroke-width="4"/>
  <!-- Tree rings -->
  <circle cx="160" cy="148" r="92"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.9"/>
  <circle cx="160" cy="148" r="78"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.9"/>
  <circle cx="160" cy="148" r="63"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.85"/>
  <circle cx="160" cy="148" r="48"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.8"/>
  <circle cx="160" cy="148" r="33"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.75"/>
  <circle cx="160" cy="148" r="18"  fill="none" stroke="#C4B49A" stroke-width="1.5" opacity="0.7"/>
  <circle cx="160" cy="148" r="6"   fill="#C4B49A" opacity="0.6"/>

  <!-- ── PINE TREES (clipped inside circle, top) ── -->
  <g clip-path="url(#circleClip)" fill="#1E1E1E">
    <!-- Tree left -->
    <polygon points="110,140 122,115 134,140"/>
    <polygon points="108,128 122,100 136,128"/>
    <polygon points="107,115 122,84  137,115"/>
    <rect x="119" y="140" width="6" height="14"/>
    <!-- Tree center -->
    <polygon points="147,142 160,116 173,142"/>
    <polygon points="145,130 160,102 175,130"/>
    <polygon points="144,116 160,84  176,116"/>
    <rect x="157" y="142" width="6" height="14"/>
    <!-- Tree right -->
    <polygon points="186,140 198,115 210,140"/>
    <polygon points="184,128 198,100 212,128"/>
    <polygon points="183,115 198,84  213,115"/>
    <rect x="195" y="140" width="6" height="14"/>
  </g>

  <!-- ── TEXT BANNER ── -->
  <!-- Dark band across center of circle -->
  <rect x="44" y="174" width="232" height="52" rx="5" fill="#1A1A1A"/>
  <!-- Thin highlight lines on banner -->
  <rect x="44" y="174" width="232" height="2"  rx="0" fill="#444" opacity="0.6"/>
  <rect x="44" y="224" width="232" height="2"  rx="0" fill="#444" opacity="0.6"/>

  <!-- BLOCKSONS — stroke layer (outline) -->
  <text x="155" y="213"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-size="44" font-weight="900" letter-spacing="-1"
    fill="none" stroke="#111" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"
    paint-order="stroke">BLOCKSONS</text>
  <!-- BLOCKSONS — gradient fill -->
  <text x="155" y="213"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-size="44" font-weight="900" letter-spacing="-1"
    fill="url(#textGrad)">BLOCKSONS</text>

  <!-- LLC — top right of wordmark -->
  <text x="266" y="183"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="15" font-weight="900"
    fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round">LLC</text>
  <text x="266" y="183"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="15" font-weight="900"
    fill="url(#textGrad)">LLC</text>

  <!-- ── ROOTS / CRACKS (bottom of circle) ── -->
  <g stroke="#1E1E1E" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center root -->
    <path d="M160 254 L155 272 L148 285 L152 300" stroke-width="3.5"/>
    <path d="M160 265 L167 278 L164 292"           stroke-width="2.5"/>
    <!-- Left roots -->
    <path d="M135 250 L122 268 L108 284 L102 302"  stroke-width="3.5"/>
    <path d="M128 258 L118 274 L112 288"           stroke-width="2"/>
    <!-- Right roots -->
    <path d="M185 250 L198 268 L212 284 L218 302"  stroke-width="3.5"/>
    <path d="M192 258 L202 274 L208 288"           stroke-width="2"/>
  </g>
</svg>
